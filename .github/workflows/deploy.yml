name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Record host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_PATH_RAW='${{ secrets.DEPLOY_PATH }}'
            DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH_RAW" | tr -d '\r' | sed 's/^"//; s/"$//; s/[[:space:]]*$//')"
            if [ -z "$DEPLOY_PATH" ]; then
              echo "ERROR: DEPLOY_PATH secret is empty."
              exit 1
            fi
            echo "Deploy path: $DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            if [ ! -e .git ]; then
              echo "ERROR: DEPLOY_PATH is not a git clone (.git missing). Clone the repo here first."
              exit 1
            fi
            if ! git remote get-url origin >/dev/null 2>&1; then
              ORIGIN_URL="${{ secrets.DEPLOY_ORIGIN_URL }}"
              if [ -z "$ORIGIN_URL" ]; then
                ORIGIN_URL="git@github.com:amitmhrzn16-tech/packrs-site-cinematic.git"
              fi
              echo "Adding missing git remote origin -> $ORIGIN_URL"
              git remote add origin "$ORIGIN_URL"
            fi
            echo "Using origin: $(git remote get-url origin)"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/deploy.sh
